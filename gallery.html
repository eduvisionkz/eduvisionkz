<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Галерея | EduVision KZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="nav-placeholder"></div>

<main class="page">
  <div class="page-header">
    <h1 id="galleryTitle">Галерея</h1>
    <p id="galleryDesc">Оқушылардың жұмыстары, видео және фото материалдар</p>
  </div>

  <div class="filter-bar" id="galleryFilters">
    <button class="filter-btn active" data-cat="all">Барлығы</button>
    <button class="filter-btn" data-cat="reading">Оқу</button>
    <button class="filter-btn" data-cat="creative">Шығармашылық</button>
    <button class="filter-btn" data-cat="technology">Технология</button>
    <button class="filter-btn" data-cat="results">Нәтиже</button>
  </div>

  <div class="media-grid" id="gallery"></div>
</main>

<div class="modal" id="modal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">✕</button>
</div>

<footer>EduVision KZ &copy; Авторлық білім беру платформасы</footer>

<script src="js/media-data.js"></script>
<script src="js/nav.js"></script>
<script src="js/gallery.js"></script>
</body>
</html>

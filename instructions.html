<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нұсқаулық | EduVision KZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="nav-placeholder"></div>

<main class="page">
  <div class="page-header">
    <h1>Цифрлық құралдар навигаторы</h1>
    <p>Мәтінді оқығаннан кейін сурет, видео, AR/VR немесе мультфильм жасауға арналған нұсқаулық</p>
  </div>

  <div class="tool-tabs" id="toolTabs">
    <button class="filter-btn active" onclick="showGroup('image',this)">Сурет</button>
    <button class="filter-btn" onclick="showGroup('animate',this)">Оживление</button>
    <button class="filter-btn" onclick="showGroup('video',this)">Видео</button>
    <button class="filter-btn" onclick="showGroup('arvr',this)">AR / VR</button>
    <button class="filter-btn" onclick="showGroup('storybook',this)">Storybook</button>
  </div>

  <div class="tool-grid" id="toolsArea"></div>
</main>

<footer>EduVision KZ &copy; Авторлық білім беру платформасы</footer>

<script src="js/nav.js"></script>
<script src="js/instructions.js"></script>
</body>
</html>
